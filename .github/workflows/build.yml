name: Build YummyMood APK

on:
  push:
    branches: [ main ] # سيتم التشغيل عند الرفع على فرع main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          
      - run: flutter pub get
      
      # بناء التطبيق بصيغة App Bundle (للنشر على متجر Google Play)
      # يمكنك تغييره إلى apk-- إذا أردت ملف APK مباشرة
      - run: flutter build appbundle
      
      # رفع ملف الـ Build كـ Artifact لتتمكن من تحميله
      - uses: actions/upload-artifact@v3
        with:
          name: app-release
          path: build/app/outputs/bundle/release/app-release.aab
